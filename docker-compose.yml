version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:8000"
    env_file: .env
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://flask:flask@db:5432/flask_template
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app           # live-reload during development
    command: flask run --host 0.0.0.0 --port 8000 --debug

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flask
      POSTGRES_PASSWORD: flask
      POSTGRES_DB: flask_template
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flask"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
